name: Container CI

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

env:
  ARCHITECTURES: amd64 arm64

jobs:
  container-build:
    strategy:
      fail-fast: false
      matrix:
        container:
          - crud-server
          - game-server
          - game-frontend
          - migration
          - rauthy-init
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-26.04
          - arch: arm64
            runner: ubuntu-26.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to dhi.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push ${{ matrix.container }} (${{ matrix.arch }})
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Containerfile
          target: runtime-${{ matrix.container }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ghcr.io/alisterd51/rusty-${{ matrix.container }}:${{ inputs.tag }}-${{ matrix.arch }}

  container-manifest:
    needs: container-build
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        container:
          - crud-server
          - game-server
          - game-frontend
          - migration
          - rauthy-init
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push manifest
        env:
          CONTAINER_NAME: ${{ matrix.container }}
          IMAGE_TAG: ${{ inputs.tag }}
        run: |
          IMAGES=()
          IFS=' ' read -r -a ARCH_ARRAY <<< "$ARCHITECTURES"
          for arch in "${ARCH_ARRAY[@]}"; do
            IMAGES+=("ghcr.io/alisterd51/rusty-${CONTAINER_NAME}:${IMAGE_TAG}-$arch")
          done
          docker buildx imagetools create -t ghcr.io/alisterd51/rusty-${CONTAINER_NAME}:${IMAGE_TAG} "${IMAGES[@]}"
          docker buildx imagetools create -t ghcr.io/alisterd51/rusty-${CONTAINER_NAME}:latest "${IMAGES[@]}"
