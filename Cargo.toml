[workspace]
resolver = "3"
members = [
	"rusty",
	"rusty-crud-client",
	"rusty-crud-server",
	"rusty-game-client",
	"rusty-game-server",
	"rusty-migration"
]

package.version = "0.6.0"
package.edition = "2024"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
diesel = { version = "2.2", features = ["postgres", "r2d2"] }
diesel_migrations = { version = "2.2", features = ["postgres"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.44", features = ["full"] }
tonic = "0.13"
prost = "0.13"
tonic-build = "0.13"

[workspace.lints.rust]
warnings = "deny"
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "deny"
pedantic = "deny"
nursery = "deny"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
strip = true
